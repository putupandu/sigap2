<div class="max-w-2xl mx-auto space-y-6">
    <div class="flex items-center">
        <a href="/logistics" class="mr-4 text-slate-400 hover:text-slate-600">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        </a>
        <h1 class="text-2xl font-bold text-slate-900 tracking-tight">Tambah Logistik Baru</h1>
    </div>

    <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
        <form action="/logistics" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700">Nama Barang</label>
                <input name="item_name" type="text" required placeholder="Contoh: Beras, Selimut" class="mt-1 block w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-sigap-500 focus:border-sigap-500 sm:text-sm">
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700">Jumlah Awal</label>
                    <input name="quantity" type="number" min="0" required class="mt-1 block w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-sigap-500 focus:border-sigap-500 sm:text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700">Satuan</label>
                    <input name="unit" type="text" required placeholder="Contoh: kg, dus, pcs" class="mt-1 block w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-sigap-500 focus:border-sigap-500 sm:text-sm">
                </div>
            </div>

            <div class="pt-4 border-t border-slate-100 flex justify-end">
                <button type="submit" class="px-6 py-2 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-sigap-600 hover:bg-sigap-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-sigap-500">
                    Simpan Barang
                </button>
            </div>
        </form>
    </div>
</div>
