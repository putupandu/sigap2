<div class="max-w-3xl mx-auto">
    <!-- Header -->
    <div class="mb-8 flex items-center justify-between">
        <div>
            <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight flex items-center">
                <a href="/volunteers" class="mr-3 text-slate-400 hover:text-slate-600 transition">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                </a>
                Pendaftaran Relawan Baru
            </h1>
            <p class="mt-1 text-sm text-slate-500 ml-9">Tambahkan anggota tim relawan baru ke dalam sistem.</p>
        </div>
    </div>

    <!-- Form Card -->
    <div class="bg-white shadow-xl shadow-slate-200/40 rounded-2xl border border-slate-100 overflow-hidden">
        <div class="bg-gradient-to-r from-slate-900 to-slate-800 px-8 py-6 border-b border-slate-700 flex items-center">
            <div class="w-12 h-12 bg-white/10 rounded-full flex items-center justify-center mr-4 border border-white/20">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path></svg>
            </div>
            <div>
                <h2 class="text-lg font-semibold text-white">Informasi Akun Relawan</h2>
                <p class="text-slate-300 text-sm">Harap masukkan data yang valid untuk relawan baru.</p>
            </div>
        </div>

        <div class="p-8">
            {{ if .Error }}
            <div class="mb-6 bg-red-50 border-l-4 border-red-500 p-4 rounded-md flex items-start">
                <svg class="h-5 w-5 text-red-400 mt-0.5 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <p class="text-sm text-red-700 font-medium">{{ .Error }}</p>
            </div>
            {{ end }}

            <form action="/volunteers/create" method="POST" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Kolom 1 -->
                    <div class="space-y-6">
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1">Nama Lengkap <span class="text-red-500">*</span></label>
                            <input name="name" type="text" required value="{{ .Name }}"
                                class="block w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-sigap-500 focus:border-sigap-500 sm:text-sm bg-slate-50 transition placeholder-slate-400" placeholder="Contoh: Budi Santoso">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1">Alamat Email <span class="text-red-500">*</span></label>
                            <input name="email" type="email" required value="{{ .Email }}"
                                class="block w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-sigap-500 focus:border-sigap-500 sm:text-sm bg-slate-50 transition placeholder-slate-400" placeholder="budi@example.com">
                        </div>
                    </div>

                    <!-- Kolom 2 -->
                    <div class="space-y-6">
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1">Nomor WhatsApp <span class="text-red-500">*</span></label>
                            <div class="relative">
                                <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-500 font-medium">+62</span>
                                <input name="phone" type="text" required value="{{ .Phone }}"
                                    class="block w-full pl-12 pr-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-sigap-500 focus:border-sigap-500 sm:text-sm bg-slate-50 transition placeholder-slate-400" placeholder="8123456789">
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1">Password Sementara <span class="text-red-500">*</span></label>
                            <input name="password" type="password" required
                                class="block w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-sigap-500 focus:border-sigap-500 sm:text-sm bg-slate-50 transition placeholder-slate-400" placeholder="Minimal 6 karakter">
                            <p class="mt-2 text-xs text-slate-500 flex items-center">
                                <svg class="w-4 h-4 mr-1 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                Relawan dapat mengganti password ini nantinya.
                            </p>
                        </div>
                    </div>
                </div>

                <div class="pt-6 border-t border-slate-100 flex items-center justify-end space-x-3">
                    <a href="/volunteers" class="px-6 py-2.5 rounded-xl border border-slate-200 text-sm font-medium text-slate-600 hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-200 transition">
                        Batal
                    </a>
                    <button type="submit" class="px-6 py-2.5 rounded-xl border border-transparent shadow-sm text-sm font-medium text-white bg-sigap-600 hover:bg-sigap-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-sigap-500 transition-colors flex items-center">
                        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                        Daftarkan Relawan
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
